<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BrightLoop Studio PH logo">
  <defs>
    <linearGradient id="loopWarm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE45E"/>
      <stop offset="55%" stop-color="#FFB703"/>
      <stop offset="100%" stop-color="#FB8500"/>
    </linearGradient>
    <linearGradient id="loopCool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="55%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#0A4FAF"/>
    </linearGradient>
    <radialGradient id="bulbGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FFF9B0"/>
      <stop offset="55%" stop-color="#FFD84D"/>
      <stop offset="100%" stop-color="#F6B90A"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="#FFFFFF"/>

  <g transform="translate(0, 10)">
    <path
      d="M360 265
         C 290 265, 235 320, 235 390
         C 235 460, 290 515, 360 515
         C 440 515, 500 450, 560 390
         C 620 330, 680 265, 760 265
         C 830 265, 885 320, 885 390
         C 885 460, 830 515, 760 515
         C 680 515, 620 450, 560 390
         C 500 330, 440 265, 360 265 Z"
      fill="none"
      stroke="url(#loopWarm)"
      stroke-width="34"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M360 265
         C 290 265, 235 320, 235 390
         C 235 460, 290 515, 360 515
         C 440 515, 500 450, 560 390
         C 620 330, 680 265, 760 265
         C 830 265, 885 320, 885 390
         C 885 460, 830 515, 760 515
         C 680 515, 620 450, 560 390"
      fill="none"
      stroke="url(#loopCool)"
      stroke-width="34"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-dasharray="640 380"
      stroke-dashoffset="-390"
    />

    <circle cx="365" cy="390" r="50" fill="#FFFDF0"/>
    <path d="M345 380 C350 370, 365 370, 370 380" fill="none" stroke="#0A4FAF" stroke-width="7" stroke-linecap="round"/>
    <path d="M360 380 C365 370, 380 370, 385 380" fill="none" stroke="#0A4FAF" stroke-width="7" stroke-linecap="round"/>
    <path d="M342 406 C352 425, 378 425, 388 406" fill="none" stroke="#0A4FAF" stroke-width="8" stroke-linecap="round"/>

    <g transform="translate(748, 177)" filter="url(#softGlow)">
      <ellipse cx="70" cy="98" rx="83" ry="83" fill="url(#bulbGlow)" stroke="#F1B900" stroke-width="9"/>
      <rect x="45" y="165" width="50" height="43" rx="11" fill="#1E63B5"/>
      <path d="M56 79 C68 60, 86 67, 92 82" fill="none" stroke="#FFFCE5" stroke-width="8" stroke-linecap="round"/>
      <path d="M34 15 L18 -20" stroke="#F1B900" stroke-width="11" stroke-linecap="round"/>
      <path d="M70 -3 L70 -40" stroke="#F1B900" stroke-width="11" stroke-linecap="round"/>
      <path d="M106 15 L122 -20" stroke="#F1B900" stroke-width="11" stroke-linecap="round"/>
      <path d="M126 56 L162 45" stroke="#F1B900" stroke-width="11" stroke-linecap="round"/>
      <path d="M15 56 L-20 45" stroke="#F1B900" stroke-width="11" stroke-linecap="round"/>
    </g>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="700" y="690" font-size="128" font-weight="800" fill="#0A4FAF" letter-spacing="3">BRIGHTLOOP</text>
    <text x="700" y="785" font-size="94" font-weight="500" fill="#0A4FAF" letter-spacing="5">STUDIO</text>
    <text x="700" y="855" font-size="78" font-weight="700" fill="#F1B900" letter-spacing="4">PH</text>
